{% extends 'base.html' %}

{% block content %}
<div class="min-h-[calc(100vh-12rem)] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-white rounded-[2.5rem] p-8 md:p-10 shadow-xl shadow-slate-100 border border-slate-100/80">
        <!-- Icon -->
        <div class="flex flex-col items-center mb-8">
            <div class="bg-teal-500/10 text-teal-600 p-4 rounded-3xl mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0zM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766z" />
                </svg>
            </div>
            <h2 class="text-3xl font-black text-slate-900">Crie sua conta</h2>
            <p class="text-slate-500 font-semibold text-sm mt-2">Junte-se à nossa comunidade de adoção</p>
        </div>

        <form method="POST" action="{% url 'cadastro' %}" class="space-y-6">
            {% csrf_token %}
            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}

            <!-- Nome -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Nome Completo</label>
                <input type="text" name="nome" required placeholder="Seu nome completo" class="w-full bg-slate-50 border border-slate-100 text-slate-700 px-4 py-3.5 rounded-2xl focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all outline-none font-semibold shadow-sm">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">E-mail</label>
                <input type="email" name="email" required placeholder="seu@email.com" class="w-full bg-slate-50 border border-slate-100 text-slate-700 px-4 py-3.5 rounded-2xl focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all outline-none font-semibold shadow-sm">
            </div>

            <!-- Telefone -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Telefone</label>
                <input type="text" name="telefone" required placeholder="(81) 99999-9999" class="w-full bg-slate-50 border border-slate-100 text-slate-700 px-4 py-3.5 rounded-2xl focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all outline-none font-semibold shadow-sm">
            </div>

            <!-- Senha -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Senha</label>
                <input type="password" name="senha" required placeholder="••••••••" class="w-full bg-slate-50 border border-slate-100 text-slate-700 px-4 py-3.5 rounded-2xl focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all outline-none font-semibold shadow-sm">
            </div>

            <!-- Botão Cadastrar -->
            <button type="submit" class="w-full bg-[#14B8A6] hover:bg-[#0D9488] text-white font-extrabold text-lg py-4 rounded-2xl transition-all duration-300 shadow-lg shadow-teal-150/45 hover:shadow-xl hover:shadow-teal-200/50 hover:scale-[1.01] cursor-pointer">
                Criar Conta
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-slate-500 text-sm font-semibold">
                Já tem uma conta? 
                <a href="{% url 'login' %}{% if next %}?next={{ next }}{% endif %}" class="text-teal-600 hover:text-teal-700 hover:underline">Faça login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
