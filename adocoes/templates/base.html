<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdotePet - Transforme uma Vida</title>
    
    <!-- Google Fonts: Outfit (super moderna e amigável) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-800 min-h-screen flex flex-col pt-20">

    <!-- Navbar Fixa -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <!-- Logo -->
            <a href="{% url 'home' %}" class="flex items-center gap-3 group">
                <div class="bg-teal-500 text-white p-2 rounded-2xl group-hover:scale-105 transition-transform shadow-md shadow-teal-150">
                    <!-- SVG de Patinha -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 fill-current" viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zm-4.5-3c.83 0 1.5-.67 1.5-1.5S8.33 8 7.5 8 6 8.67 6 9.5s.67 1.5 1.5 1.5zm9 0c.83 0 1.5-.67 1.5-1.5S17.33 8 16.5 8 15 8.67 15 9.5s.67 1.5 1.5 1.5zm-9 6.5c.83 0 1.5-.67 1.5-1.5S8.33 13 7.5 13 6 13.67 6 14.5s.67 1.5 1.5 1.5zm9 0c.83 0 1.5-.67 1.5-1.5S17.33 13 16.5 13 15 13.67 15 14.5s.67 1.5 1.5 1.5z"/>
                    </svg>
                </div>
                <span class="text-2xl font-black tracking-tight text-slate-900">
                    Adote<span class="text-teal-500">Pet</span>
                </span>
            </a>

            <!-- Links -->
            <div class="hidden md:flex items-center gap-8 font-semibold text-slate-600">
                <a href="{% url 'home' %}" class="hover:text-teal-500 transition-colors">Encontrar Pet</a>
                <a href="{% url 'como-adotar' %}" class="hover:text-teal-500 transition-colors">Como Adotar</a>
                <a href="{% url 'sobre-nos' %}" class="hover:text-teal-500 transition-colors">Sobre Nós</a>
                <a href="{% url 'ongs-parceiras' %}" class="hover:text-teal-500 transition-colors">ONGs Parceiras</a>
            </div>

            <!-- Botão Login Arredondado -->
            <div>
                <a href="#" class="px-6 py-3 bg-slate-900 hover:bg-teal-500 text-white font-bold rounded-full transition-all shadow-md hover:shadow-lg hover:shadow-teal-100 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                    </svg>
                    <span>Login</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer Fixo / Elegante -->
    <footer class="bg-white border-t border-slate-100 py-8">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-teal-500/10 text-teal-600 p-1.5 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 fill-current" viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zm-4.5-3c.83 0 1.5-.67 1.5-1.5S8.33 8 7.5 8 6 8.67 6 9.5s.67 1.5 1.5 1.5zm9 0c.83 0 1.5-.67 1.5-1.5S17.33 8 16.5 8 15 8.67 15 9.5s.67 1.5 1.5 1.5zm-9 6.5c.83 0 1.5-.67 1.5-1.5S8.33 13 7.5 13 6 13.67 6 14.5s.67 1.5 1.5 1.5zm9 0c.83 0 1.5-.67 1.5-1.5S17.33 13 16.5 13 15 13.67 15 14.5s.67 1.5 1.5 1.5z"/>
                    </svg>
                </div>
                <span class="text-lg font-bold text-slate-800">Adote<span class="text-teal-500">Pet</span></span>
            </div>
            <p class="text-sm text-slate-500 font-medium text-center md:text-left">
                &copy; 2026 AdotePet. Feito com amor. Todos os direitos reservados.
            </p>
            <div class="flex gap-6 text-sm text-slate-500 font-semibold">
                <a href="#" class="hover:text-teal-500 transition-colors">Termos</a>
                <a href="#" class="hover:text-teal-500 transition-colors">Privacidade</a>
                <a href="#" class="hover:text-teal-500 transition-colors">Contato</a>
            </div>
        </div>
    </footer>

</body>
</html>
